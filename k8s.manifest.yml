apiVersion: apps/v1
kind: Deployment
metadata:
  name: mote-app
  namespace: mote-app
  labels:
    app: mote-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mote-app
  template:
    metadata:
      labels:
        app: mote-app
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      containers:
      - name: mote-app
        image: moteapp.azurecr.io/mote/mote-app:latest
        ports:
        - containerPort: 80
        env:
        - name: NODE_ENV
          value: production
        resources:
          requests:
            memory: "50Mi"
            cpu: "1m"
          limits:
            memory: "128Mi"
            cpu: "75m"
---
apiVersion: v1
kind: Service
metadata:
  name: mote-app
  namespace: mote-app
  labels:
    app: mote-app
spec:
  selector:
    app: mote-app
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer