apiVersion: apps/v1
kind: Deployment
metadata:
  name: mote-app
  namespace: mote-app
  labels:
    app: mote-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mote-app
  template:
    metadata:
      labels:
        app: mote-app
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      containers:
      - name: mote-app
        image: moteapp.azurecr.io/mote/mote-app:latest
        ports:
        - containerPort: 80
        env:
        - name: NODE_ENV
          value: production
        resources:
          requests:
            cpu: "10m"
            memory: "256Mi"
          limits:
            memory: "1Gi"
            cpu: "75m"
        startupProbe:
          httpGet:
            path: /_health
            port: 80
          initialDelaySeconds: 120
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /_health
            port: 80
          initialDelaySeconds: 120
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /_health
            port: 80
          initialDelaySeconds: 120
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mote-app
  namespace: mote-app
  labels:
    app: mote-app
spec:
  selector:
    app: mote-app
  ports:
    - port: 80
  type: LoadBalancer