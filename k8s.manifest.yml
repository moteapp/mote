apiVersion: apps/v1
kind: Deployment
metadata:
  name: mote-app
  namespace: mote-app
  labels:
    app: mote-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mote-app
  template:
    metadata:
      labels:
        app: mote-app
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      containers:
      - name: mote-app
        image: mote-app:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "50Mi"
            cpu: "1m"
          limits:
            memory: "128Mi"
            cpu: "75m"
        livenessProbe:
          httpGet:
            path: /_health
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 3
          timeoutSeconds: 1
          successThreshold: 1
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mote-app
  namespace: mote-app
  labels:
    app: mote-app
spec:
  selector:
    app: mote-app
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer